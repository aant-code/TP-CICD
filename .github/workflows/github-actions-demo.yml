name: Getting-startded
run-name: Getting-started
on: [push]
jobs:
  Deploy project:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🐧 Let's cook mister"
      - name: Check out repository code
        uses: actions/checkout@v5
      - run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}${{ secrets.DOCKERHUB_PORJECT }} .
      - run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_PASSWORD }}
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}${{ secrets.DOCKERHUB_PORJECT }}
      - run: curl ${{ secrets.DEPLOY_HOOK }}